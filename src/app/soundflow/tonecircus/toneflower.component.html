<div style="margin-left: 1rem">
  <label>{{ i18n.strings().labelVidstupZgory }} </label>
  <input
    matInput
    type="number"
    [ngModel]="bushMarginTop"
    (ngModelChange)="redrawBush()"
    (input)="setBushMarginTop($event)"
    style="width: 48px; margin-right: 12px"
  />

  <button
    matButton="elevated"
    (click)="toggleChyslo()"
    style="margin-right: 12px"
  >
    {{ i18n.strings().btnShowNumber }}
  </button>

  <button
    matButton="elevated"
    (click)="i18n.toggle()"
    style="margin-left: auto; font-weight: 700; letter-spacing: 0.08em"
  >
    {{ i18n.currentLang() === "lat" ? "UA" : "LAT" }}
  </button>
  @if (showChyslo) {
    <mat-slider
      min="0"
      [max]="IC.padAngleMax"
      step="0.01"
      discrete
      style="width: 500px"
    >
      <input
        matSliderThumb
        [(ngModel)]="padAngle"
        (ngModelChange)="redrawBush()"
      />
    </mat-slider>
    <input
      matInput
      type="number"
      [ngModel]="padAngle"
      (ngModelChange)="redrawBush()"
      (input)="setPadAngle($event)"
      style="width: 48px; margin-right: 12px"
    />
    <button
      matButton="elevated"
      (click)="toggleBgStyle()"
      style="margin-right: 12px"
    >
      {{ i18n.strings().btnBgColor }}
    </button>
  }
</div>

<div class="flex-row midwrap" style="margin-right: 2.5rem">
  @if (showSettings) {
    <app-idn-list (onIdnUpdate)="redrawBush()" />
  }
  <app-arc-info-panel [info]="hoveredArc()" [clickedInfo]="clickedArc()" />
  <div class="bushcont left">
    <figure class="bushwrap" id="bushwrap"></figure>
    <app-arrangement-presets bushId="main" />
  </div>
  <div class="bushcont right">
    <figure class="bushwrap" id="rozpakovka-bushwrap"></figure>
    <app-arrangement-presets bushId="rozpakovka" />
  </div>
  <div style="display: flex; flex-direction: column; align-items: flex-start">
    <button
      matButton="elevated"
      (click)="rightPanelOpen.set(!rightPanelOpen())"
      style="margin-bottom: 8px; font-size: 0.75rem"
    >
      {{ rightPanelOpen() ? "▶" : "◀" }}
    </button>
    @if (rightPanelOpen()) {
      <app-get-ordinal
        (onBushUpdate)="updateBush($event)"
        (onRozpakovkaBushUpdate)="updateRozpakovkaBush($event)"
        [refresh]="bushMarginTop"
      />
    }
  </div>
</div>

<div style="margin: 2.5rem">
  <app-abetka></app-abetka>
</div>
