<div class="presets-row">
  @for (preset of presets; track $index; let i = $index) {
    <button
      class="preset-btn"
      [class.active]="activePreset === i"
      [title]="preset.name"
      (click)="selectPreset(i)"
    >
      <svg width="44" height="44" viewBox="0 0 44 44" aria-hidden="true">
        @for (dot of thumbnailDots(preset.points); track $index) {
          <circle [attr.cx]="dot.cx" [attr.cy]="dot.cy" r="4" />
        }
      </svg>
    </button>
  }
  <button
    class="preset-btn custom-btn"
    [class.active]="activePreset === 'custom'"
    title="Moia kompozytsiia"
    (click)="activateCustom()"
  >
    MOJA
  </button>
</div>
