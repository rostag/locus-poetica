<div class="presets-row">
  @for (preset of presets; track $index; let i = $index) {
    <button
      class="preset-btn"
      [class.active]="activePreset === i"
      [title]="preset.name"
      (click)="selectPreset(i)"
    >
      <svg width="44" height="44" viewBox="0 0 44 44" aria-hidden="true">
        @for (dot of thumbnailDots(preset.points); track $index) {
          <circle [attr.cx]="dot.cx" [attr.cy]="dot.cy" r="4" />
        }
      </svg>
    </button>
  }
  <button
    class="preset-btn custom-btn"
    [class.active]="activePreset === 'custom'"
    title="Moia kompozytsiia"
    (click)="activateCustom()"
  >
    MOJA
  </button>
</div>

@if (bushId === 'main') {
  <div class="size-controls">
    <div class="size-sliders">
      <label class="slider-label">
        <span>{{ i18n.strings().labels.labelYadro }}</span>
        <input type="range" min="5" max="20" [value]="svc.flowerButtSize()" (input)="onButtSize($event)" />
        <span class="slider-val">{{ svc.flowerButtSize() }}</span>
      </label>
      <label class="slider-label">
        <span>{{ i18n.strings().labels.labelRozmir }}</span>
        <input type="range" min="5" max="20" [value]="svc.flowerLeafWidth()" (input)="onLeafWidth($event)" />
        <span class="slider-val">{{ svc.flowerLeafWidth() }}</span>
      </label>
    </div>
    <button class="copy-btn" (click)="copyLayout()">
      {{ copied() ? i18n.strings().btnCopied : i18n.strings().btnCopyLayout }}
    </button>
  </div>
}
